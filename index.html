<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diary of a Wimpy Kid - 2004 Reader</title>
    <!-- Loading the OpenJPEG decoder library -->
    <script src="https://cdn.jsdelivr.net/npm/openjpegjs@1.1.1/dist/openjpegjs.js"></script>
    <style>
        body {
            background-color: #fffcf2;
            font-family: "Comic Sans MS", cursive;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
        }
        .header { text-align: center; }
        .viewer {
            background: white;
            border: 3px solid #000;
            box-shadow: 10px 10px 0px #000;
            max-width: 600px;
            width: 100%;
            margin-top: 20px;
            display: flex;
            justify-content: center;
            min-height: 400px;
        }
        canvas {
            max-width: 100%;
            height: auto;
            display: block;
        }
        .controls {
            margin-top: 30px;
            display: flex;
            align-items: center;
            gap: 20px;
        }
        button {
            padding: 10px 25px;
            font-size: 18px;
            background: #000;
            color: #fff;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }
        button:disabled { background: #666; cursor: not-allowed; }
        #status {
            margin-top: 10px;
            font-size: 14px;
            color: #555;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Diary of a Wimpy Kid</h1>
        <p id="page-display">Page 0 / 1278</p>
    </div>

    <div class="viewer">
        <canvas id="book-canvas"></canvas>
    </div>

    <p id="status">Initializing decoder...</p>

    <div class="controls">
        <button id="prev-btn" disabled>Back</button>
        <button id="next-btn" disabled>Next</button>
    </div>

    <script>
        let currentPage = 0;
        const totalPages = 1278;
        const splitPoint = 1000;
        
        const canvas = document.getElementById('book-canvas');
        const ctx = canvas.getContext('2d');
        const status = document.getElementById('status');
        const pageDisplay = document.getElementById('page-display');

        // Initialize OpenJPEG
        let decoder;
        openjpegjs().then(api => {
            decoder = api;
            status.innerText = "Decoder Ready. Loading page...";
            updatePage();
            
            // Enable buttons once decoder is ready
            document.getElementById('next-btn').disabled = false;
            document.getElementById('prev-btn').disabled = false;
        });

        async function updatePage() {
            if (!decoder) return;

            status.innerText = "Decoding page... (this may take a second)";
            const folder = currentPage <= splitPoint ? 'public/pages' : 'public/pages2';
            const fileName = `Diary of a Wimpy Kid book 1 online version_${String(currentPage).padStart(4, '0')}.jp2`;
            const fullPath = `${folder}/${fileName}`;

            try {
                // 1. Fetch file
                const resp = await fetch(fullPath);
                if (!resp.ok) throw new Error("File not found");
                const buffer = await resp.arrayBuffer();
                const uint8Array = new Uint8Array(buffer);

                // 2. Decode JP2
                const decoded = decoder.decode(uint8Array);
                
                // 3. Prepare Canvas
                canvas.width = decoded.width;
                canvas.height = decoded.height;
                
                // 4. Draw decoded data
                const imgData = ctx.createImageData(decoded.width, decoded.height);
                imgData.data.set(decoded.data);
                ctx.putImageData(imgData, 0, 0);

                // Update UI
                pageDisplay.innerText = `Page ${currentPage} / ${totalPages}`;
                status.innerText = "Ready";
                
                document.getElementById('prev-btn').disabled = currentPage === 0;
                document.getElementById('next-btn').disabled = currentPage === totalPages;

            } catch (err) {
                console.error(err);
                status.innerText = "Error loading page. Check console.";
            }
        }

        document.getElementById('next-btn').onclick = () => { if(currentPage < totalPages) { currentPage++; updatePage(); } };
        document.getElementById('prev-btn').onclick = () => { if(currentPage > 0) { currentPage--; updatePage(); } };

        window.onkeydown = (e) => {
            if (e.key === "ArrowRight") document.getElementById('next-btn').click();
            if (e.key === "ArrowLeft") document.getElementById('prev-btn').click();
        };
    </script>
</body>
</html>
